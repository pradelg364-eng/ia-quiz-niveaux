<title>Les 7 Niveaux de l'Utilisateur IA</title>
<meta name="description" content="Évaluez vos compétences IA en 7 questions rapides et obtenez votre feuille de route personnalisée.">

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Lucide Icons CDN -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(32px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }

  .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
  .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
  .animate-slide-in-right { animation: slideInRight 0.4s ease-out forwards; }
  .animate-scale-in { animation: scaleIn 0.5s ease-out forwards; }

  .bg-glow-purple { background: radial-gradient(ellipse at center, rgba(139, 92, 246, 0.08) 0%, transparent 70%); }
  .bg-glow-blue { background: radial-gradient(ellipse at center, rgba(59, 130, 246, 0.06) 0%, transparent 70%); }

<body class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 sm:p-12 selection:bg-indigo-500/20">

  <!-- Background glows -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-glow-purple rounded-full blur-[128px]"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-glow-blue rounded-full blur-[128px]"></div>
  </div>

  <!-- App Container -->
  <div id="app" class="relative z-10 w-full flex justify-center"></div>

  <!-- Footer -->
  <footer class="relative z-10 mt-12 text-center space-y-1">
    <p class="text-xs text-slate-400">&copy; 2026 RD Chronicles. Tous droits réservés.</p>
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer" class="text-xs text-slate-400 hover:text-slate-600 transition-colors">
      Created with Perplexity Computer
    </a>
  </footer>

<script>
// --- DATA ---

const questions = [
  {
    question: "Comment formulez-vous généralement vos demandes à l'IA ?",
    options: [
      { text: "Je pose des questions simples, d'une seule phrase, comme sur un moteur de recherche.", points: 1 },
      { text: "J'utilise une structure claire : Instruction + Contexte + Contraintes.", points: 2 },
      { text: "J'ai sauvegardé mes meilleurs prompts et contextes pour ne pas avoir à les réécrire.", points: 3 },
      { text: "Je laisse l'IA planifier et exécuter les étapes complexes pour moi de A à Z.", points: 4 }
    ]
  },
  {
    question: "Devez-vous répéter qui vous êtes ou ce que vous faites à chaque conversation avec l'IA ?",
    options: [
      { text: "Oui, je repars souvent de zéro à chaque fois.", points: 1 },
      { text: "Non, je demande à l'IA de me poser des questions pour rassembler le contexte nécessaire.", points: 2 },
      { text: "Non, j'utilise la fonctionnalité 'Projets' (Claude) ou des GPTs où tout est pré-configuré.", points: 3 },
      { text: "Mon système (ex: agents locaux) apprend de moi en continu et se souvient de tout mon contexte.", points: 4 }
    ]
  },
  {
    question: "Quels outils IA utilisez-vous au quotidien ?",
    options: [
      { text: "Juste un LLM de base, souvent la version gratuite (ex: ChatGPT).", points: 1 },
      { text: "Je choisis entre ChatGPT, Claude ou Gemini selon la tâche spécifique.", points: 2 },
      { text: "J'utilise des outils très spécifiques (NotebookLM, Granola, générateurs d'images).", points: 3 },
      { text: "J'orchestre plusieurs modèles et outils ensemble dans des workflows (ex: n8n, Zapier).", points: 4 }
    ]
  },
  {
    question: "Avez-vous déjà créé vos propres outils ou applications avec l'IA ?",
    options: [
      { text: "Non, je ne sais pas coder et ça me semble trop complexe.", points: 1 },
      { text: "J'ai utilisé Canvas ou Artifacts pour 'vibe coder' des petits prototypes interactifs.", points: 2 },
      { text: "J'ai construit de vrais outils internes utiles avec des plateformes comme Lovable ou Google AI Studio.", points: 3 },
      { text: "J'ai codé des applications logicielles complexes ou des extensions de A à Z avec Claude Code.", points: 4 }
    ]
  },
  {
    question: "Quelle est la part d'automatisation dans votre travail avec l'IA ?",
    options: [
      { text: "Aucune, je lance et gère chaque requête manuellement.", points: 1 },
      { text: "L'IA m'aide à aller plus vite, mais je reste aux commandes de chaque étape.", points: 2 },
      { text: "J'ai mis en place des automatisations qui se déclenchent seules et travaillent en arrière-plan.", points: 3 },
      { text: "J'ai des workflows complexes où des agents IA coordonnent d'autres agents de manière autonome.", points: 4 }
    ]
  },
  {
    question: "Face à une tâche manuelle longue et ennuyeuse, quelle est votre première pensée ?",
    options: [
      { text: "Comment l'IA peut m'aider à réfléchir ou rédiger plus vite ?", points: 1 },
      { text: "Quel est l'outil spécialisé existant qui pourrait s'en charger à ma place ?", points: 2 },
      { text: "Comment construire une automatisation qui fera ça automatiquement à l'avenir ?", points: 3 },
      { text: "Comment coder un agent complet pour remplacer cette nécessité humaine ?", points: 4 }
    ]
  },
  {
    question: "Quel est votre objectif ultime avec l'IA ?",
    options: [
      { text: "Gagner quelques heures par semaine sur des tâches chronophages.", points: 1 },
      { text: "Me créer un écosystème d'outils sur-mesure pour booster ma productivité.", points: 2 },
      { text: "Avoir des assistants automatisés qui travaillent pendant que je dors.", points: 3 },
      { text: "Bâtir une entreprise 'licorne' à un milliard de dollars en étant le seul employé.", points: 4 }
    ]
  }
];

const levelsData = {
  1: {
    title: "Le Novice de la Recherche",
    description: "Vous utilisez l'IA comme un moteur de recherche amélioré. Vous posez des questions simples et l'utilisez ponctuellement. C'est utile, mais cela ne ressemble pas encore à un véritable superpouvoir.",
    nextStep: "Commencez à structurer vos prompts (Instruction + Contexte + Contraintes). Une astuce simple : demandez toujours à l'IA de vous poser des questions de clarification avant de vous fournir sa réponse définitive."
  },
  2: {
    title: "L'Artisan du Prompt",
    description: "Vous réfléchissez activement à la manière dont vous posez vos questions. Vous comprenez que la qualité de l'entrée détermine la qualité de la sortie, et vous voyez déjà de bien meilleurs résultats.",
    nextStep: "Arrêtez de repartir de zéro à chaque conversation. Utilisez la fonctionnalité 'Projets' de Claude ou les 'GPTs' personnalisés pour sauvegarder votre contexte, vos instructions et votre ton de voix."
  },
  3: {
    title: "L'Ingénieur du Contexte",
    description: "Vous avez des espaces de travail dédiés. L'IA connaît déjà vos objectifs et votre style. Les tâches qui vous prenaient une après-midi entière ne vous prennent plus que 20 minutes.",
    nextStep: "Sortez des LLMs classiques. Commencez à utiliser les bons outils pour les bonnes tâches (NotebookLM pour la recherche, Granola pour les réunions) et testez la création de mini-applications avec Claude Artifacts ou ChatGPT Canvas."
  },
  4: {
    title: "L'Explorateur d'Écosystème",
    description: "Vous utilisez une grande variété d'outils spécialisés et vous commencez à 'vibe coder' des prototypes. L'IA est devenue un véritable couteau suisse parfaitement intégré à votre métier.",
    nextStep: "Arrêtez de tout déclencher manuellement. Utilisez des outils comme Zapier, Lovable ou Google AI Studio pour créer des processus et des automatisations qui s'exécutent de manière autonome en arrière-plan."
  },
  5: {
    title: "Le Bâtisseur d'Automatisations",
    description: "Vous avez un changement d'état d'esprit : vous ne cherchez plus à faire les choses plus vite, vous construisez des systèmes qui les font pour vous. Vos automatisations tournent même quand vous dormez.",
    nextStep: "Passez de la simple automatisation à la création de systèmes logiciels complexes. Explorez 'Claude Code' pour créer des applications entières ou 'n8n' pour des workflows impliquant l'orchestration de plusieurs agents IA."
  },
  6: {
    title: "L'Architecte de Systèmes",
    description: "Vous ne voyez plus de problèmes, seulement des systèmes à construire. Vous codez des applications sur mesure en quelques prompts et vous déployez des agents locaux autonomes (comme OpenClaw).",
    nextStep: "Vous êtes à la pointe technique. L'étape ultime (niveau 7) est purement aspirationnelle : utiliser votre armée d'agents IA pour bâtir, gérer et faire croître une entreprise d'un milliard de dollars en étant le seul employé."
  },
  7: {
    title: "Le Fondateur Licorne",
    description: "Félicitations, vous êtes au sommet absolu ! Vous dirigez une véritable force de travail composée d'agents IA qui gèrent votre entreprise 24h/24, pendant que vous vous concentrez sur la vision stratégique.",
    nextStep: "Continuez à innover et à expérimenter avec les modèles de pointe. Vous définissez aujourd'hui la manière dont les entreprises de demain fonctionneront !"
  }
};

// --- APP STATE ---

let appState = 'intro';
let currentQuestion = 0;
let score = 0;

function calculateLevel(finalScore) {
  if (finalScore <= 9) return 1;
  if (finalScore <= 12) return 2;
  if (finalScore <= 15) return 3;
  if (finalScore <= 18) return 4;
  if (finalScore <= 21) return 5;
  if (finalScore <= 25) return 6;
  return 7;
}

// --- ICON HELPER ---

function icon(name, cls = '') {
  return `<i data-lucide="${name}" class="${cls}"></i>`;
}

// --- RENDER FUNCTIONS ---

function renderIntro() {
  return `
    <div class="flex flex-col items-center justify-center text-center space-y-8 animate-scale-in">
      <div class="w-24 h-24 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-3xl flex items-center justify-center shadow-2xl shadow-indigo-500/25 mb-4 hover:scale-105 transition-transform">
        ${icon('brain', 'w-12 h-12 text-white')}
      </div>
      <div class="space-y-4 max-w-2xl">
        <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 leading-tight pb-1">
          Les 7 Niveaux de l'Utilisateur IA
        </h1>
        <p class="text-lg md:text-xl text-slate-600 leading-relaxed">
          Il y a deux types de personnes : celles qui gagnent 5 minutes sur un e-mail, et celles qui font tourner des entreprises entières pendant qu'elles dorment.
        </p>
        <p class="text-slate-500">
          Évaluez vos compétences en 7 questions rapides et obtenez votre feuille de route pour débloquer de nouveaux superpouvoirs.
        </p>
      </div>
      <button 
        onclick="startQuiz()"
        class="group relative px-8 py-4 bg-indigo-600 text-white font-bold rounded-full text-lg shadow-lg shadow-indigo-500/30 hover:shadow-xl hover:shadow-indigo-500/40 transition-all duration-300 hover:-translate-y-1 flex items-center gap-3 overflow-hidden cursor-pointer"
      >
        <span class="relative z-10">Démarrer l'évaluation</span>
        ${icon('arrow-right', 'w-5 h-5 relative z-10 group-hover:translate-x-1 transition-transform')}
        <div class="absolute inset-0 bg-gradient-to-r from-indigo-600 to-purple-600 opacity-0 group-hover:opacity-100 transition-opacity"></div>
      </button>
    </div>
  `;
}

function renderQuiz() {
  const q = questions[currentQuestion];
  const progress = (currentQuestion / questions.length) * 100;

  let optionsHTML = q.options.map((opt, idx) => `
    <button
      onclick="handleAnswer(${opt.points})"
      class="w-full flex items-center justify-between text-left p-5 rounded-2xl border border-slate-200 bg-white hover:bg-indigo-50 hover:border-indigo-300 transition-all duration-200 group cursor-pointer shadow-sm hover:shadow-md"
    >
      <span class="text-slate-700 group-hover:text-slate-900 text-base sm:text-lg leading-snug">
        ${opt.text}
      </span>
      <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shrink-0 ml-4">
        ${icon('chevron-right', 'w-5 h-5')}
      </div>
    </button>
  `).join('');

  return `
    <div class="w-full max-w-3xl flex flex-col items-center animate-slide-in-right">
      <div class="w-full mb-8 space-y-2">
        <div class="flex justify-between text-sm text-slate-500 font-medium">
          <span>Question ${currentQuestion + 1} sur ${questions.length}</span>
          <span>${Math.round(progress)}%</span>
        </div>
        <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
          <div 
            class="h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-500 ease-out"
            style="width: ${progress}%"
          ></div>
        </div>
      </div>

      <div class="w-full bg-white border border-slate-200 rounded-3xl p-6 md:p-10 shadow-xl">
        <h2 class="text-xl sm:text-2xl md:text-3xl font-semibold text-slate-900 mb-8 leading-snug">
          ${q.question}
        </h2>
        <div class="space-y-4">
          ${optionsHTML}
        </div>
      </div>
    </div>
  `;
}

function renderResult() {
  const levelNumber = calculateLevel(score);
  const data = levelsData[levelNumber];
  const nextLevel = levelNumber < 7 ? levelNumber + 1 : 7;

  return `
    <div class="w-full max-w-4xl flex flex-col items-center animate-fade-in-up">
      
      <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-indigo-100 border border-indigo-200 text-indigo-700 font-semibold mb-8 text-sm uppercase tracking-wider">
        ${icon('sparkles', 'w-4 h-4')}
        Votre Diagnostic IA
      </div>

      <div class="w-full grid grid-cols-1 md:grid-cols-5 gap-6">
        
        <!-- Main Result Card -->
        <div class="md:col-span-3 bg-gradient-to-br from-indigo-600 to-purple-700 rounded-3xl p-8 shadow-2xl shadow-indigo-500/20 relative overflow-hidden">
          <div class="absolute top-0 right-0 -mt-8 -mr-8 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
          <div class="absolute bottom-0 left-0 -mb-8 -ml-8 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
          
          <div class="relative z-10 space-y-6">
            <div class="flex items-center gap-4">
              <div class="w-16 h-16 bg-white/20 backdrop-blur rounded-2xl flex items-center justify-center shadow-lg">
                <span class="text-3xl font-black text-white">${levelNumber}</span>
              </div>
              <div>
                <h3 class="text-indigo-200 text-sm font-semibold uppercase tracking-wider">Vous êtes au</h3>
                <h2 class="text-3xl font-bold text-white">Niveau ${levelNumber}</h2>
              </div>
            </div>
            
            <div class="pt-4 border-t border-white/20">
              <h3 class="text-2xl font-bold text-indigo-100 mb-4">${data.title}</h3>
              <p class="text-indigo-100/90 text-lg leading-relaxed">
                ${data.description}
              </p>
            </div>
          </div>
        </div>

        <!-- Advice Card -->
        <div class="md:col-span-2 flex flex-col gap-6">
          <div class="flex-1 bg-white border border-slate-200 rounded-3xl p-8 shadow-xl">
            <div class="flex items-center gap-3 text-indigo-600 mb-4">
              ${icon('target', 'w-6 h-6')}
              <h3 class="text-xl font-bold text-slate-900">Objectif Niveau ${nextLevel}</h3>
            </div>
            <p class="text-slate-600 font-medium leading-relaxed">
              ${data.nextStep}
            </p>
          </div>

          <button 
            onclick="startQuiz()"
            class="w-full py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-2xl transition-colors flex items-center justify-center gap-2 border border-slate-200 hover:border-slate-300 cursor-pointer"
          >
            ${icon('refresh-cw', 'w-5 h-5')}
            Refaire l'évaluation
          </button>
        </div>
      </div>
    </div>
  `;
}

// --- APP LOGIC ---

function render() {
  const app = document.getElementById('app');
  if (appState === 'intro') app.innerHTML = renderIntro();
  else if (appState === 'quiz') app.innerHTML = renderQuiz();
  else if (appState === 'result') app.innerHTML = renderResult();
  
  // Re-initialize Lucide icons after DOM update
  lucide.createIcons();
}

function startQuiz() {
  appState = 'quiz';
  currentQuestion = 0;
  score = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function handleAnswer(points) {
  score += points;
  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    render();
  } else {
    appState = 'result';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// Initial render
document.addEventListener('DOMContentLoaded', render);
</script>

</body>
</html>
